{% extends "base.html" %}
{% block title %}{{ code }} {{ title }} | FuturePath{% endblock %}
{% block content %}
  <section class="error-shell">
    <div class="container">
      <div class="error-layout">
        <div class="error-code" aria-hidden="true">{{ code }}</div>
        <div><span class="section-kicker"><i class="bi bi-exclamation-triangle"></i> REQUEST NOT COMPLETED</span><h1>{{ title }}</h1><p>{{ message }}</p><div class="error-actions"><a class="btn btn-primary" href="{{ url_for('main.index') }}"><i class="bi bi-house me-1"></i> Back to Events</a><a class="btn btn-outline-dark" href="{{ url_for('main.score_finder') }}">Open Score Finder</a></div></div>
      </div>
    </div>
  </section>
{% endblock %}
